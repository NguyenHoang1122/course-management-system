<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout :: headMeta}"></th:block>
    <title>Register - Course Management System</title>

    <th:block th:replace="~{layout :: headCoreCss}"></th:block>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>

<body class="auth-page">

<div th:replace="~{layout :: siteHeader}"></div>

<div class="register-container">
    <form class="register-wrapper" th:action="@{/auth/register}" th:object="${userRegisterDTO}" method="post">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <!-- Logo -->
        <div class="logo-login">
            <a th:href="@{/}">
                <img th:src="@{/img/logo/logo.png}" alt="Logo">
            </a>
        </div>

        <!-- Title -->
        <h2 class="register-form">Đăng Ký Tài Khoản</h2>
        <p class="subtitle">Tạo tài khoản mới để bắt đầu hành trình học tập</p>

        <div th:if="${registerError}" class="alert alert-danger" role="alert" th:text="${registerError}"></div>

        <!-- User Name -->
        <div class="form-group">
            <label for="username">
                <i class="fas fa-user"></i> Tên đăng nhập
            </label>
            <input
                    type="text"
                    id="username"
                    th:field="*{userName}"
                    placeholder="Nhập tên đăng nhập của bạn"
                    required>
            <small th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}" class="text-danger"></small>
        </div>

        <div class="form-group">
            <label for="fullName">
                <i class="fas fa-id-card"></i> Họ tên
            </label>
            <input
                    type="text"
                    id="fullName"
                    th:field="*{fullName}"
                    placeholder="Nhập họ tên của bạn"
                    required>
            <small th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="text-danger"></small>
        </div>

        <!-- Email -->
        <div class="form-group">
            <label for="email">
                <i class="fas fa-envelope"></i> Email
            </label>
            <input
                    type="email"
                    id="email"
                    th:field="*{email}"
                    placeholder="Nhập email của bạn"
                    required>
            <small th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger"></small>
        </div>

        <!-- Password -->
        <div class="form-group form-input">
            <label for="password">
                <i class="fas fa-lock"></i> Mật khẩu
            </label>
            <input
                    type="password"
                    id="password"
                    th:field="*{password}"
                    placeholder="Nhập mật khẩu (tối thiểu 6 ký tự)"
                    required
                    minlength="6">
            <span class="password-toggle" onclick="togglePasswordRegister('password')">
                <i class="fas fa-eye"></i>
            </span>
            <div class="password-requirements">
                <ul>
                    <li><i class="fas fa-check-circle"></i>Tối thiểu 6 ký tự</li>
                    <li><i class="fas fa-check-circle"></i>Nên có chữ hoa và chữ thường</li>
                    <li><i class="fas fa-check-circle"></i>Nên chứa số</li>
                </ul>
            </div>
            <small th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger"></small>
        </div>

        <!-- Confirm Password -->
        <div class="form-group form-input">
            <label for="confirmPassword">
                <i class="fas fa-lock"></i> Xác Nhận Mật Khẩu
            </label>
            <input
                    type="password"
                    id="confirmPassword"
                    th:field="*{confirmPassword}"
                    placeholder="Nhập lại mật khẩu"
                    required>
            <span class="password-toggle" onclick="togglePasswordRegister('confirmPassword')">
                <i class="fas fa-eye"></i>
            </span>
            <small th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="text-danger"></small>
        </div>

        <!-- Terms & Conditions -->
        <div class="terms-check">
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms" style="margin: 0;">
                Tôi đồng ý với <a href="#">Điều khoản dịch vụ</a> và <a href="#">Chính sách bảo mật</a>
            </label>
        </div>

        <!-- Register Button -->
        <div class="register-btn-group">
            <button type="submit" class="btn-register" id="registerBtn">
                <i class="fas fa-user-plus"></i> Đăng Ký
            </button>
        </div>

        <!-- Divider -->
        <div class="divider">
            <span>Hoặc</span>
        </div>

        <!-- Login Link -->
        <div class="auth-link">
            <p>Đã có tài khoản?</p>
            <a th:href="@{/auth/login}">
                <i class="fas fa-sign-in-alt"></i> Đăng Nhập
            </a>
        </div>

    </form>
</div>

<div th:replace="~{layout :: siteFooter}"></div>

<th:block th:replace="~{layout :: coreScripts}"></th:block>

<script>
    function togglePasswordRegister(fieldId) {
        const input = document.getElementById(fieldId);
        const toggleIcon = event.target.closest('.password-toggle').querySelector('i');

        if (input.type === 'password') {
            input.type = 'text';
            toggleIcon.classList.remove('fa-eye');
            toggleIcon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            toggleIcon.classList.remove('fa-eye-slash');
            toggleIcon.classList.add('fa-eye');
        }
    }

    // Validate password match on form submit
    document.querySelector('form').addEventListener('submit', function(e) {
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (password !== confirmPassword) {
            e.preventDefault();
            alert('Mật khẩu không khớp! Vui lòng kiểm tra lại.');
            return false;
        }
    });

    // Real-time password match validation
    document.getElementById('confirmPassword').addEventListener('input', function() {
        const password = document.getElementById('password').value;
        const confirmPassword = this.value;

        if (confirmPassword && password !== confirmPassword) {
            this.style.borderColor = '#FF4757';
        } else if (confirmPassword && password === confirmPassword) {
            this.style.borderColor = '#09cc7f';
        } else {
            this.style.borderColor = '#e5e5e5';
        }
    });
</script>

</body>
</html>

<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout :: headMeta}"></th:block>
    <title>Đăng Ký - Course Management System</title>

    <th:block th:replace="~{layout :: headCoreCss}"></th:block>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <link rel="stylesheet" th:href="@{/css/pages/register.css}">
</head>

<body class="auth-page">

<div th:replace="~{layout :: siteHeader(isTransparent=false)}"></div>

<div class="register-container">
    <form class="register-wrapper" id="registerForm"
          th:action="@{/auth/register}" th:object="${userRegisterDTO}" method="post"
          novalidate>

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <!-- Logo -->
        <div class="logo-login">
            <a th:href="@{/}">
                <img th:src="@{/img/logo/logo.png}" alt="Logo">
            </a>
        </div>

        <!-- Title -->
        <h2 class="register-form">Đăng Ký Tài Khoản</h2>
        <p class="subtitle">Tạo tài khoản mới để bắt đầu hành trình học tập</p>

        <!-- Global error -->
        <div th:if="${registerError}" class="alert-danger" role="alert">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${registerError}"></span>
        </div>

        <!-- ===== USERNAME ===== -->
        <div class="form-group" id="group-userName">
            <label for="username">
                <i class="fas fa-user"></i> Tên Đăng Nhập
            </label>
            <div class="input-wrapper">
                <input
                    type="text"
                    id="username"
                    th:field="*{userName}"
                    th:classappend="${#fields.hasErrors('userName')} ? 'is-invalid' : ''"
                    placeholder="Ví dụ: hoangnguyen123"
                    autocomplete="username">
                <span class="validation-icon icon-valid"><i class="fas fa-check-circle"></i></span>
                <span class="validation-icon icon-invalid"><i class="fas fa-times-circle"></i></span>
            </div>
            <!-- Server-side error -->
            <div th:if="${#fields.hasErrors('userName')}" class="field-error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:errors="*{userName}"></span>
            </div>
            <!-- Client-side error placeholder -->
            <div class="field-error" id="err-userName" style="display:none;">
                <i class="fas fa-exclamation-circle"></i>
                <span id="err-userName-msg"></span>
            </div>
        </div>

        <!-- ===== FULL NAME ===== -->
        <div class="form-group" id="group-fullName">
            <label for="fullName">
                <i class="fas fa-id-card"></i> Họ Tên
            </label>
            <div class="input-wrapper">
                <input
                    type="text"
                    id="fullName"
                    th:field="*{fullName}"
                    th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''"
                    placeholder="Ví dụ: Nguyễn Văn Hoàng"
                    autocomplete="name">
                <span class="validation-icon icon-valid"><i class="fas fa-check-circle"></i></span>
                <span class="validation-icon icon-invalid"><i class="fas fa-times-circle"></i></span>
            </div>
            <div th:if="${#fields.hasErrors('fullName')}" class="field-error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:errors="*{fullName}"></span>
            </div>
            <div class="field-error" id="err-fullName" style="display:none;">
                <i class="fas fa-exclamation-circle"></i>
                <span id="err-fullName-msg"></span>
            </div>
        </div>

        <!-- ===== EMAIL ===== -->
        <div class="form-group" id="group-email">
            <label for="email">
                <i class="fas fa-envelope"></i> Email
            </label>
            <div class="input-wrapper">
                <input
                    type="email"
                    id="email"
                    th:field="*{email}"
                    th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                    placeholder="Ví dụ: example@gmail.com"
                    autocomplete="email">
                <span class="validation-icon icon-valid"><i class="fas fa-check-circle"></i></span>
                <span class="validation-icon icon-invalid"><i class="fas fa-times-circle"></i></span>
            </div>
            <div th:if="${#fields.hasErrors('email')}" class="field-error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:errors="*{email}"></span>
            </div>
            <div class="field-error" id="err-email" style="display:none;">
                <i class="fas fa-exclamation-circle"></i>
                <span id="err-email-msg"></span>
            </div>
        </div>

        <!-- ===== PASSWORD ===== -->
        <div class="form-group form-input" id="group-password">
            <label for="password">
                <i class="fas fa-lock"></i> Mật Khẩu
            </label>
            <div class="input-wrapper">
                <input
                    type="password"
                    id="password"
                    th:field="*{password}"
                    th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"
                    placeholder="Tối thiểu 8 ký tự"
                    autocomplete="new-password">
                <span class="password-toggle" onclick="togglePasswordRegister('password')">
                    <i class="fas fa-eye"></i>
                </span>
                <span class="validation-icon icon-valid"><i class="fas fa-check-circle"></i></span>
                <span class="validation-icon icon-invalid"><i class="fas fa-times-circle"></i></span>
            </div>
            <!-- Strength bar -->
            <div class="password-strength-bar" id="strengthBar">
                <div class="bar-fill" id="strengthFill"></div>
            </div>
            <div class="strength-label" id="strengthLabel"></div>
            <!-- Requirements checklist -->
            <div class="password-requirements">
                <ul>
                    <li id="req-length"><i class="fas fa-circle"></i>Ít nhất 8 ký tự</li>
                    <li id="req-upper"><i class="fas fa-circle"></i>Có ít nhất 1 chữ HOA</li>
                    <li id="req-lower"><i class="fas fa-circle"></i>Có ít nhất 1 chữ thường</li>
                    <li id="req-digit"><i class="fas fa-circle"></i>Có ít nhất 1 chữ số</li>
                </ul>
            </div>
            <div th:if="${#fields.hasErrors('password')}" class="field-error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:errors="*{password}"></span>
            </div>
            <div class="field-error" id="err-password" style="display:none;">
                <i class="fas fa-exclamation-circle"></i>
                <span id="err-password-msg"></span>
            </div>
        </div>

        <!-- ===== CONFIRM PASSWORD ===== -->
        <div class="form-group form-input" id="group-confirmPassword">
            <label for="confirmPassword">
                <i class="fas fa-lock"></i> Xác Nhận Mật Khẩu
            </label>
            <div class="input-wrapper">
                <input
                    type="password"
                    id="confirmPassword"
                    th:field="*{confirmPassword}"
                    th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''"
                    placeholder="Nhập lại mật khẩu"
                    autocomplete="new-password">
                <span class="password-toggle" onclick="togglePasswordRegister('confirmPassword')">
                    <i class="fas fa-eye"></i>
                </span>
                <span class="validation-icon icon-valid"><i class="fas fa-check-circle"></i></span>
                <span class="validation-icon icon-invalid"><i class="fas fa-times-circle"></i></span>
            </div>
            <div th:if="${#fields.hasErrors('confirmPassword')}" class="field-error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:errors="*{confirmPassword}"></span>
            </div>
            <div class="field-error" id="err-confirmPassword" style="display:none;">
                <i class="fas fa-exclamation-circle"></i>
                <span id="err-confirmPassword-msg"></span>
            </div>
        </div>

        <!-- ===== TERMS ===== -->
        <div class="terms-check" id="group-terms">
            <input type="checkbox" id="terms" name="terms">
            <label for="terms" style="margin: 0;">
                Tôi đồng ý với <a href="#">Điều khoản dịch vụ</a> và <a href="#">Chính sách bảo mật</a>
            </label>
        </div>
        <div class="field-error" id="err-terms" style="display:none; margin-top:4px; margin-bottom:8px;">
            <i class="fas fa-exclamation-circle"></i>
            <span>Bạn phải đồng ý với điều khoản dịch vụ</span>
        </div>

        <!-- ===== SUBMIT ===== -->
        <div class="register-btn-group">
            <button type="submit" class="btn-register" id="registerBtn">
                <i class="fas fa-user-plus"></i> Đăng Ký
            </button>
        </div>

        <!-- Divider -->
        <div class="divider">
            <span>Hoặc</span>
        </div>

        <!-- Login Link -->
        <div class="auth-link">
            <p>Đã có tài khoản?</p>
            <a th:href="@{/auth/login}">
                <i class="fas fa-sign-in-alt"></i> Đăng Nhập
            </a>
        </div>

    </form>
</div>

<div th:replace="~{layout :: siteFooter}"></div>

<th:block th:replace="~{layout :: coreScripts}"></th:block>

<script th:src="@{/js/pages/register.js}"></script>

</body>
</html>

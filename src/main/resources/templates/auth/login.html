<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout :: headMeta}"></th:block>
    <title>Login - Course Management System</title>

    <th:block th:replace="~{layout :: headCoreCss}"></th:block>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>

<body class="auth-page">

<div th:replace="~{layout :: siteHeader}"></div>

<div class="login-container">
    <form class="login-wrapper" th:action="@{/auth/login}" method="post">

        <!-- CSRF disabled in config, removing hidden input to prevent errors -->

        <!-- Logo -->
        <div class="logo-login">
            <a th:href="@{/}">
                <img th:src="@{/img/logo/logo.png}" alt="Logo">
            </a>
        </div>

        <!-- Title -->
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to your account to continue learning</p>

        <!-- Error Message -->
        <div th:if="${param.error}" class="alert alert-danger" role="alert">
            <i class="fas fa-exclamation-circle"></i>
            Sai tài khoản hoặc mật khẩu!
        </div>

        <!-- Success Message -->
        <div th:if="${param.register}" class="alert alert-success" role="alert">
            <i class="fas fa-check-circle"></i>
            Đăng ký thành công! Vui lòng đăng nhập.
        </div>

        <div th:if="${param.logout}" class="alert alert-success" role="alert">
            <i class="fas fa-check-circle"></i>
            Đăng xuất thành công!
        </div>

        <!-- Username -->
        <div class="form-group">
            <label for="username">
                <i class="fas fa-user"></i> Tên đăng nhập
            </label>
            <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Nhập email của bạn"
                    required
                    autofocus>
        </div>

        <!-- Password -->
        <div class="form-group form-input">
            <label for="password">
                <i class="fas fa-lock"></i> Mật khẩu
            </label>
            <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Nhập mật khẩu của bạn"
                    required>
            <span class="password-toggle" onclick="togglePassword()">
                <i class="fas fa-eye"></i>
            </span>
        </div>

        <!-- Remember & Forgot -->
        <div class="remember-forgot">
            <label>
                <input type="checkbox" name="remember-me">
                Ghi nhớ tôi
            </label>
            <a href="#">Quên mật khẩu?</a>
        </div>

        <!-- Login Button -->
        <div class="login-btn-group">
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> Đăng Nhập
            </button>
        </div>

        <!-- Divider -->
        <div class="divider">
            <span>Hoặc</span>
        </div>

        <!-- Register Link -->
        <div class="auth-link">
            <p>Chưa có tài khoản?</p>
            <a th:href="@{/auth/register}">
                <i class="fas fa-user-plus"></i> Đăng Ký Ngay
            </a>
        </div>

    </form>
</div>

<div th:replace="~{layout :: siteFooter}"></div>

<th:block th:replace="~{layout :: coreScripts}"></th:block>

<script>
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.querySelector('.password-toggle i');

        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('fa-eye');
            toggleIcon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('fa-eye-slash');
            toggleIcon.classList.add('fa-eye');
        }
    }
</script>

</body>
</html>

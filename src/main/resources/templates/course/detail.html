<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detail Course</title>
</head>
<body>
<h1>Chi tiết khóa học</h1>
<p><strong>Title: </strong> <span th:text="${course.title}"></span></p>
<p><strong>Description: </strong> <span th:text="${course.description}"></span></p>
<p><strong>Price: </strong> <span th:text="${course.price}"></span></p>
<p><strong>Create Date: </strong> <span th:text="${course.createdAt}"></span></p>
<p><strong>Instructor: </strong> <span th:text="${course.instructor.getFullName()}"></span></p>
<ul>
    <li th:each="lesson : ${course.lessons}">
        <p><strong>Tên bài:</strong> <span th:text="${lesson.title}"></span></p>
        <p><strong>Mô tả:</strong> <span th:text="${lesson.videoUrl}"></span></p>
    </li>
</ul>
<p>
    <a th:href="@{'/admin/course/' + ${course.id} + '/add-lesson'}">
        Add Lesson
    </a>
</p>
<p>
    <a th:href="@{'/admin/edit/' + ${course.id}}">Edit Course</a>
</p>
<p>
    <button type="button" onclick="showConfirm()">Delete Course</button>
</p>

<p>
    <a th:href="@{/courses}">Back to list</a>
</p>
<div id="confirmBox" style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
">

    <div style="
        background:white;
        padding:20px;
        border-radius:10px;
        text-align:center;
        min-width:300px;
    ">
        <p>Bạn có muốn xóa không?</p>

        <!-- Form XÓA -->
        <form th:action="@{'/admin/delete/' + ${course.id}}" method="post">
            <button type="submit">Yes</button>
            <button type="button" onclick="hideConfirm()">No</button>
        </form>
    </div>
</div>
<script>
    function showConfirm() {
        document.getElementById("confirmBox").style.display = "flex";
    }

    function hideConfirm() {
        document.getElementById("confirmBox").style.display = "none";
    }
</script>
</body>
</html>

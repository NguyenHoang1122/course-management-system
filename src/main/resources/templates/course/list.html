<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>List Course</title>
</head>
<body>
<h1>List Course</h1>
<table>
    <thead>
    <tr>
        <th>STT</th>
        <th>Title</th>
        <th>Description</th>
        <th>Create Date</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="course,stt : ${courses}">
        <td th:text="${stt.index + 1}"></td>
        <td th:text="${course.title}"></td>
        <td th:text="${course.description}"></td>
        <td th:text="${course.createdAt}"></td>
        <td>
            <a th:href="@{'/courses/' + ${course.id}}">View</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>

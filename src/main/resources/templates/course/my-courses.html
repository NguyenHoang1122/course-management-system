<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <th:block th:replace="~{layout :: headMeta}"></th:block>
    <title>My Courses | Student Dashboard</title>
    <th:block th:replace="~{layout :: headCoreCss}"></th:block>
    <link rel="stylesheet" th:href="@{/css/profile.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .my-courses-panel { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid #eee; min-height: 600px; }
        .course-grid-dashboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .empty-state { text-align: center; padding: 100px 20px; color: #999; }
        .empty-state i { font-size: 80px; margin-bottom: 20px; opacity: 0.3; }
    </style>
</head>
<body>

<th:block th:replace="~{layout :: siteHeader(isTransparent=false)}"></th:block>

<div class="profile-dashboard-wrapper">
    <!-- Hero Background -->
    <div class="profile-hero" style="background-image: url('https://images.unsplash.com/photo-1497633762265-9d179a990aa6?auto=format&fit=crop&q=80&w=1600')">
        <div class="profile-hero-content">
            <h1>My Learning Journey</h1>
            <p>Continue where you left off and master new skills.</p>
        </div>
    </div>

    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <aside class="dashboard-sidebar">
            <!-- We need 'user' object here, controller passes it to /profile, usually it's in a fragment or security principal -->
            <!-- In CourseController/my-courses, we might need to add User to the model if the fragment needs it -->
            <div th:replace="~{profile/fragments/sidebar :: profileSidebar('courses')}"></div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main-content">
            <div class="my-courses-panel">
                <div class="course-section-header">
                    <h3>All Enrolled Courses</h3>
                    <span class="badge badge-primary px-3 py-2" style="border-radius: 10px; background: var(--accent-color);" th:text="${courses.size()} + ' Courses'">0 Courses</span>
                </div>

                <div th:if="${courses != null and !courses.isEmpty()}" class="course-grid-dashboard">
                    <div th:each="course : ${courses}" class="dashboard-course-card">
                        <div class="db-course-image" th:style="'background-image: url(' + (${course.imageUrl != null and !course.imageUrl.isEmpty()} ? (${course.imageUrl.startsWith('http') ? course.imageUrl : '/' + course.imageUrl}) : 'https://images.unsplash.com/photo-1497633762265-9d179a990aa6?auto=format&fit=crop&q=80&w=800') + ')'"></div>
                        <div class="db-course-body">
                            <span class="db-course-category" th:text="${course.category != null ? course.category : 'General'}">Category</span>
                            <h4 class="db-course-title" th:text="${course.title}">Course Title</h4>
                            
                            <div class="mt-3">
                                <small class="text-muted d-block mb-2">
                                    <i class="fas fa-user-circle mr-1"></i> 
                                    <span th:text="${course.instructor != null ? course.instructor.fullName : 'Expert Instructor'}">Instructor</span>
                                </small>
                            </div>

                            <a th:href="@{'/courses/' + ${course.id}}" class="btn-continue">
                                <i class="fas fa-play mr-2"></i> Go to Course
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Empty State -->
                <div th:if="${courses == null or courses.isEmpty()}" class="empty-state">
                    <i class="fas fa-graduation-cap"></i>
                    <h4>You haven't enrolled in any courses yet.</h4>
                    <p>Unlock your potential with our expert-led courses.</p>
                    <a th:href="@{/courses}" class="btn btn-primary mt-3 px-5 py-3 rounded-pill">Find a Course</a>
                </div>
            </div>
        </main>
    </div>
</div>

<th:block th:replace="~{layout :: siteFooter}"></th:block>
<th:block th:replace="~{layout :: coreScripts}"></th:block>

</body>
</html>

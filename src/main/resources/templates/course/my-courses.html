<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>My Courses</title>
</head>
<body>

<h2>My Courses</h2>

<table border="1">
  <tr>
    <th>ID</th>
    <th>Title</th>
    <th>Description</th>
  </tr>

  <tr th:each="course : ${courses}">
    <td th:text="${course.id}"></td>
    <td th:text="${course.title}"></td>
    <td th:text="${course.description}"></td>
  </tr>

</table>

</body>
</html>

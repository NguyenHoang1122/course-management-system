<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <th:block th:replace="~{layout :: headMeta}"></th:block>
    <title>Edit Profile | Student Dashboard</title>
    <th:block th:replace="~{layout :: headCoreCss}"></th:block>
    <link rel="stylesheet" th:href="@{/css/profile.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/pages/edit.css}">
</head>
<body>

<th:block th:replace="~{layout :: siteHeader(isTransparent=false)}"></th:block>

<div class="profile-dashboard-wrapper">
    <!-- Hero Background Area -->
    <div class="profile-hero" th:style="'background-image: url(' + (${user.coverPhoto != null} ? (${user.coverPhoto.startsWith('http') ? user.coverPhoto : (user.coverPhoto.startsWith('/') ? user.coverPhoto : '/' + user.coverPhoto)}) : 'https://images.unsplash.com/photo-1510070112810-d4e9a46d9e91?auto=format&fit=crop&q=80&w=1600') + ')'">
        <div class="profile-hero-content">
            <h1>Edit Profile</h1>
            <p>Keep your information up to date to get the best experience.</p>
        </div>
    </div>

    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <aside class="dashboard-sidebar">
            <div th:replace="~{profile/fragments/sidebar :: profileSidebar('edit')}"></div>
        </aside>

        <!-- Main Form Panel -->
        <main class="dashboard-main-content">
            <div class="form-panel">
                <h3 class="form-section-title"><i class="fas fa-user-edit mr-2"></i> Account Information</h3>

                <form th:action="@{/profile/edit}" th:object="${userProfileDTO}" method="post" enctype="multipart/form-data">
                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label">Full Name</label>
                            <input type="text" th:field="*{fullName}" class="form-control" placeholder="Enter your full name">
                            <div th:if="${#fields.hasErrors('fullName')}" class="field-error" th:errors="*{fullName}"></div>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label">Email Address</label>
                            <input type="email" th:field="*{email}" class="form-control" placeholder="Enter your email">
                            <div th:if="${#fields.hasErrors('email')}" class="field-error" th:errors="*{email}"></div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label">Phone Number</label>
                            <input type="text" th:field="*{phone}" class="form-control" placeholder="Enter your phone">
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label">Avatar</label>
                            <input type="file" name="avatarFile" class="form-control">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Address</label>
                        <input type="text" th:field="*{address}" class="form-control" placeholder="Enter your address">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Bio (Short introduction)</label>
                        <textarea th:field="*{bio}" class="form-control" rows="4" placeholder="Tell us something about yourself..."></textarea>
                    </div>

                    <div class="text-right">
                        <button type="submit" class="btn-update">Save Changes</button>
                    </div>
                </form>
            </div>

            <!-- Change Password Panel -->
            <div class="form-panel">
                <h3 class="form-section-title"><i class="fas fa-lock mr-2"></i> Change Password</h3>
                <form th:action="@{/profile/change-password}" method="post">
                    <div class="row">
                        <div class="col-md-4 mb-4">
                            <label class="form-label">Current Password</label>
                            <input type="password" name="currentPassword" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-4">
                            <label class="form-label">New Password</label>
                            <input type="password" name="newPassword" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-4">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" name="confirmPassword" class="form-control" required>
                        </div>
                    </div>
                    <div class="text-right">
                        <button type="submit" class="btn-update">Update Password</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</div>

<th:block th:replace="~{layout :: siteFooter}"></th:block>
<th:block th:replace="~{layout :: coreScripts}"></th:block>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <th:block th:replace="~{layout :: headMeta}"></th:block>
  <title>Edit Profile</title>
  <th:block th:replace="~{layout :: headCoreCss}"></th:block>
</head>
<body>

<div th:replace="~{layout :: siteHeader}"></div>

<h2>Edit Profile</h2>

<p th:if="${updateError}" style="color: red;" th:text="${updateError}"></p>
<p th:if="${changePasswordError}" style="color: red;" th:text="${changePasswordError}"></p>
<p th:if="${param.passwordUpdated}" style="color: green;">Doi mat khau thanh cong!</p>

<form th:action="@{/profile/edit}" method="post" enctype="multipart/form-data">

  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

  <input type="hidden" th:value="${user.id}" name="id"/>

  <label>Username</label>
  <input type="text" name="userName" th:value="${user.userName}" readonly/>

  <br/>

  <label>Full name</label>
  <input type="text" name="fullName" th:value="${user.fullName}" required/>

  <br/>

  <label>Email</label>
  <input type="email" name="email" th:value="${user.email}" required/>

  <br/>

  <label>Phone</label>
  <input type="text" name="phone" th:value="${user.phone}"/>

  <br/>

  <label>Address</label>
  <input type="text" name="address" th:value="${user.address}"/>

  <br/>

  <label>Current avatar</label>
  <div>
    <img th:if="${user.avatar}" th:src="${user.avatar}" alt="Avatar" width="120"/>
    <span th:if="${#strings.isEmpty(user.avatar)}">No avatar</span>
  </div>

  <br/>

  <label>New avatar</label>
  <input type="file" name="avatarFile" accept="image/*"/>

  <br/>

  <button type="submit">Update</button>

</form>

<hr/>

<h3>Change Password</h3>

<form th:action="@{/profile/change-password}" method="post">
  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

  <label>Current password</label>
  <input type="password" name="currentPassword" required/>

  <br/>

  <label>New password</label>
  <input type="password" name="newPassword" minlength="6" required/>

  <br/>

  <label>Confirm new password</label>
  <input type="password" name="confirmPassword" minlength="6" required/>

  <br/>

  <button type="submit">Change Password</button>
</form>

<div th:replace="~{layout :: siteFooter}"></div>

<th:block th:replace="~{layout :: coreScripts}"></th:block>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <th:block th:replace="~{layout :: headMeta}"></th:block>
  <title>Profile</title>
  <th:block th:replace="~{layout :: headCoreCss}"></th:block>
</head>
<body>

<div th:replace="~{layout :: siteHeader}"></div>

<div class="container mt-5 mb-5">
    <h2>Profile</h2>

    <p th:if="${param.updated}" class="text-success">Cập nhật thông tin thành công!</p>

    <div class="row">
        <div class="col-md-4">
            <div class="card">
                <div class="card-body text-center">
                    <img th:if="${user.avatar}" th:src="${user.avatar}" alt="Avatar" class="img-fluid rounded-circle mb-3" style="width: 150px; height: 150px; object-fit: cover;"/>
                    <img th:if="${#strings.isEmpty(user.avatar)}" src="https://via.placeholder.com/150" alt="Avatar" class="img-fluid rounded-circle mb-3" style="width: 150px; height: 150px; object-fit: cover;"/>
                    
                    <h5 th:text="${user.fullName}"></h5>
                    <p class="text-muted" th:text="${user.userName}"></p>
                    <a th:href="@{/profile/edit}" class="btn btn-primary mt-2">Edit Profile</a>
                </div>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card mb-4">
                <div class="card-header">
                    <h4>Thông tin cá nhân</h4>
                </div>
                <div class="card-body">
                    <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>
                    <p><strong>Phone:</strong> <span th:text="${user.phone}"></span></p>
                    <p><strong>Address:</strong> <span th:text="${user.address}"></span></p>
                </div>
            </div>

            <div class="card">
                <div class="card-header border-bottom-0">
                    <h4 class="mb-0">Danh sách khóa học đã đăng ký</h4>
                </div>
                
                <div class="card-body p-0">
                    <div th:if="${enrollments != null and !enrollments.isEmpty()}" class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Khóa học</th>
                                    <th>Giảng viên</th>
                                    <th>Ngày đăng ký</th>
                                    <th>Tiến độ</th>
                                    <th>Trạng thái</th>
                                    <th>Link</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${enrollmentProgress}">
                                    <td th:text="${item.enrollment.course.title}"></td>
                                    <td th:text="${item.enrollment.course.instructor != null ? item.enrollment.course.instructor.fullName : 'Unknown'}"></td>
                                    <td th:text="${item.enrollment.enrolledAt != null ? #temporals.format(item.enrollment.enrolledAt, 'dd/MM/yyyy HH:mm') : '-'}"></td>
                                    <td>
                                        <span th:text="${item.completedLessons} + '/' + ${item.totalLessons}"></span>
                                        <small th:text="' (' + ${item.progressPercent} + '%)'" class="text-muted"></small>
                                    </td>
                                    <td>
                                        <span class="badge"
                                              th:classappend="${item.progressPercent == 100} ? ' bg-success' : (${item.progressPercent > 0} ? ' bg-warning' : ' bg-secondary')"
                                              th:text="${item.learningStatus}"></span>
                                    </td>
                                    <td>
                                        <a th:href="@{'/courses/' + ${item.enrollment.course.id}}" class="btn btn-sm btn-outline-primary">Vào học</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div th:if="${enrollments == null or enrollments.isEmpty()}" class="p-4 text-center">
                        <p class="text-muted mb-0">Bạn chưa đăng ký khóa học nào.</p>
                        <a th:href="@{/courses}" class="btn btn-outline-primary mt-3">Khám phá khóa học ngay</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{layout :: siteFooter}"></div>

<th:block th:replace="~{layout :: coreScripts}"></th:block>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <th:block th:replace="~{layout :: headMeta}"></th:block>
    <title>Student Dashboard | Courses</title>
    <th:block th:replace="~{layout :: headCoreCss}"></th:block>
    <link rel="stylesheet" th:href="@{/css/profile.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<th:block th:replace="~{layout :: siteHeader(isTransparent=false)}"></th:block>

<div class="profile-dashboard-wrapper">
    <!-- Hero Background Area -->
    <div class="profile-hero" th:style="'background-image: url(' + (${user.coverPhoto != null} ? (${user.coverPhoto.startsWith('http') ? user.coverPhoto : (user.coverPhoto.startsWith('/') ? user.coverPhoto : '/' + user.coverPhoto)}) : 'https://images.unsplash.com/photo-1510070112810-d4e9a46d9e91?auto=format&fit=crop&q=80&w=1600') + ')'">
        <div class="profile-hero-content">
            <h1 th:text="'Hello, ' + ${user.fullName}">Hello, User</h1>
            <p th:text="${user.bio != null and !user.bio.isEmpty() ? user.bio : 'Welcome to your learning dashboard.'}"></p>
        </div>
    </div>

    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <aside class="dashboard-sidebar">
            <div th:replace="~{profile/fragments/sidebar :: profileSidebar('dashboard')}"></div>
        </aside>

        <!-- Main Dashboard Content -->
        <main class="dashboard-main-content">
            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon enrolled"><i class="fas fa-book-open"></i></div>
                    <div class="stat-info">
                        <h4 th:text="${enrolledCount}">0</h4>
                        <p>Enrolled Courses</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon active"><i class="fas fa-play"></i></div>
                    <div class="stat-info">
                        <h4 th:text="${activeCount}">0</h4>
                        <p>Active Courses</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon completed"><i class="fas fa-check-double"></i></div>
                    <div class="stat-info">
                        <h4 th:text="${completedCount}">0</h4>
                        <p>Completed Courses</p>
                    </div>
                </div>
            </div>

            <!-- Enrolled Courses Section -->
            <div class="course-section-header">
                <h3>Current Courses</h3>
                <a th:href="@{/courses/my-courses}" class="btn-view-all">View All</a>
            </div>

            <div class="row" th:if="${enrollmentProgress != null and !enrollmentProgress.isEmpty()}">
                <div class="col-md-6 col-lg-4 mb-4" th:each="item : ${enrollmentProgress}">
                    <div class="dashboard-course-card">
                        <div class="db-course-image" th:style="'background-image: url(' + (${item.enrollment.course.imageUrl != null and !item.enrollment.course.imageUrl.isEmpty()} ? (${item.enrollment.course.imageUrl.startsWith('http') ? item.enrollment.course.imageUrl : (item.enrollment.course.imageUrl.startsWith('/') ? item.enrollment.course.imageUrl : '/' + item.enrollment.course.imageUrl)}) : 'https://images.unsplash.com/photo-1497633762265-9d179a990aa6?auto=format&fit=crop&q=80&w=800') + ')'"></div>
                        <div class="db-course-body">
                            <span class="db-course-category" th:text="${item.enrollment.course.category != null ? item.enrollment.course.category : 'General'}">Category</span>
                            <h4 class="db-course-title" th:text="${item.enrollment.course.title}">Course Title</h4>

                            <div class="db-course-progress">
                                <div class="progress-label">
                                    <span th:text="${item.learningStatus}">Status</span>
                                    <span th:text="${item.progressPercent} + '%'">0%</span>
                                </div>
                                <div class="custom-progress-bar">
                                    <div class="progress-fill" th:style="'width: ' + ${item.progressPercent} + '%'"></div>
                                </div>
                            </div>

                            <a th:href="@{'/courses/' + ${item.enrollment.course.id}}" class="btn-continue">
                                <span th:text="${item.progressPercent == 0 ? 'Start Learning' : 'Continue Learning'}">Continue</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Empty State -->
            <div th:if="${enrollmentProgress == null or enrollmentProgress.isEmpty()}" class="text-center py-5 bg-white border-radius-20 shadow-sm" style="border-radius:20px;">
                <img src="https://cdni.iconscout.com/illustration/premium/thumb/empty-cart-2130356-1800917.png" style="width: 200px; opacity: 0.6;">
                <h4 class="mt-4">You haven't enrolled in any courses yet.</h4>
                <p class="text-muted">Start your learning journey today!</p>
                <a th:href="@{/courses}" class="btn btn-primary mt-3 px-5 py-3 rounded-pill">Explore Courses</a>
            </div>

        </main>
    </div>
</div>

<th:block th:replace="~{layout :: siteFooter}"></th:block>
<th:block th:replace="~{layout :: coreScripts}"></th:block>

</body>
</html>

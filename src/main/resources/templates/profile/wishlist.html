<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <th:block th:replace="~{layout :: headMeta}"></th:block>
    <title>My Wishlist | Courses</title>
    <th:block th:replace="~{layout :: headCoreCss}"></th:block>
    <link rel="stylesheet" th:href="@{/css/profile.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .wishlist-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid var(--border-color);
            margin-bottom: 25px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }
        .wishlist-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }
        .wishlist-image {
            height: 180px;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .remove-wishlist {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff4d4d;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 5;
        }
        .remove-wishlist:hover {
            background: #ff4d4d;
            color: white;
            transform: scale(1.1);
        }
        .wishlist-body {
            padding: 20px;
        }
        .wishlist-category {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--accent-color);
            margin-bottom: 8px;
            display: block;
            letter-spacing: 0.5px;
        }
        .wishlist-title {
            font-size: 17px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 12px;
            height: 48px;
            overflow: hidden;
            color: var(--text-main);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .wishlist-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
        }
        .wishlist-price {
            font-weight: 800;
            color: var(--accent-secondary);
            font-size: 16px;
        }
        .btn-view-course {
            display: block;
            width: 100%;
            text-align: center;
            padding: 10px;
            background: #f8f9fa;
            color: var(--accent-secondary);
            border-radius: 10px;
            font-weight: 700;
            margin-top: 15px;
            text-decoration: none;
            transition: 0.3s;
            font-size: 14px;
            border: 1px solid #eee;
        }
        .btn-view-course:hover {
            background: var(--accent-secondary);
            color: white;
            border-color: var(--accent-secondary);
        }
        .empty-wishlist-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid var(--border-color);
        }
        .empty-icon {
            font-size: 80px;
            color: #eee;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<th:block th:replace="~{layout :: siteHeader(isTransparent=false)}"></th:block>

<div class="profile-dashboard-wrapper">
    <div class="profile-hero" th:style="'background-image: url(' + (${user.coverPhoto != null} ? (${user.coverPhoto.startsWith('http') ? user.coverPhoto : (user.coverPhoto.startsWith('/') ? user.coverPhoto : '/' + user.coverPhoto)}) : 'https://images.unsplash.com/photo-1510070112810-d4e9a46d9e91?auto=format&fit=crop&q=80&w=1600') + ')'">
        <div class="profile-hero-content">
            <h1>My Wishlist</h1>
            <p>Courses you've saved for later.</p>
        </div>
    </div>

    <div class="dashboard-container">
        <aside class="dashboard-sidebar">
            <div th:replace="~{profile/fragments/sidebar :: profileSidebar('wishlist')}"></div>
        </aside>

        <main class="dashboard-main-content">
            <div class="course-section-header">
                <h3>Saved Courses (<span th:text="${wishlistPage.totalElements}">0</span>)</h3>
            </div>

            <div class="row" th:if="${wishlistPage != null and !wishlistPage.isEmpty()}">
                <div class="col-md-6 col-lg-4 mb-4" th:each="item : ${wishlistPage.content}" th:id="'wishlist-item-' + ${item.course.id}">
                    <div class="wishlist-card">
                        <button class="remove-wishlist" th:onclick="'toggleWishlist(' + ${item.course.id} + ', true)'" title="Remove from wishlist">
                            <i class="fas fa-heart"></i>
                        </button>
                        <div class="wishlist-image" th:style="'background-image: url(' + (${item.course.imageUrl != null and !item.course.imageUrl.isEmpty()} ? (${item.course.imageUrl.startsWith('http') ? item.course.imageUrl : (item.course.imageUrl.startsWith('/') ? item.course.imageUrl : '/' + item.course.imageUrl)}) : 'https://images.unsplash.com/photo-1497633762265-9d179a990aa6?auto=format&fit=crop&q=80&w=800') + ')'"></div>
                        <div class="wishlist-body">
                            <span class="wishlist-category" th:text="${item.course.category != null ? item.course.category : 'General'}">Category</span>
                            <h4 class="wishlist-title" th:text="${item.course.title}">Course Title</h4>
                            
                            <div class="wishlist-meta">
                                <span class="wishlist-price">
                                    <th:block th:if="${item.course.price != null and item.course.price > 0}"
                                              th:text="${#numbers.formatDecimal(item.course.price, 1, 'COMMA', 0, 'POINT')} + ' VND'"></th:block>
                                    <th:block th:if="${item.course.price == null or item.course.price == 0}">Free</th:block>
                                </span>
                                <span style="font-size: 12px; color: #999;">
                                    <i class="far fa-calendar-alt"></i> <span th:text="${#temporals.format(item.createdAt, 'dd/MM/yyyy')}"></span>
                                </span>
                            </div>

                            <a th:href="@{'/courses/' + ${item.course.id}}" class="btn-view-course">View Details</a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Pagination -->
            <div th:if="${wishlistPage.totalPages > 1}" class="d-flex justify-content-center mt-4">
                <nav aria-label="Page navigation">
                    <ul class="pagination">
                        <li class="page-item" th:classappend="${wishlistPage.first} ? 'disabled'">
                            <a class="page-link" th:href="@{/profile/wishlist(page=${wishlistPage.number - 1})}" aria-label="Previous">
                                <span aria-hidden="true">&laquo;</span>
                            </a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, wishlistPage.totalPages - 1)}" th:classappend="${wishlistPage.number == i} ? 'active'">
                            <a class="page-link" th:href="@{/profile/wishlist(page=${i})}" th:text="${i + 1}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${wishlistPage.last} ? 'disabled'">
                            <a class="page-link" th:href="@{/profile/wishlist(page=${wishlistPage.number + 1})}" aria-label="Next">
                                <span aria-hidden="true">&raquo;</span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>

            <!-- Empty State -->
            <div th:if="${wishlistPage == null or wishlistPage.isEmpty()}" class="empty-wishlist-state">
                <div class="empty-icon"><i class="far fa-heart"></i></div>
                <h4>Your wishlist is empty</h4>
                <p class="text-muted mb-4">You haven't saved any courses to your wishlist yet.</p>
                <a th:href="@{/courses}" class="btn btn-primary px-5 py-3 rounded-pill" style="font-weight: 700; background: var(--accent-secondary); border: none;">Explore Courses</a>
            </div>
        </main>
    </div>
</div>

<th:block th:replace="~{layout :: siteFooter}"></th:block>
<th:block th:replace="~{layout :: coreScripts}"></th:block>

<script>
    function toggleWishlist(courseId, isFromWishlistPage) {
        $.ajax({
            url: '/wishlist/toggle/' + courseId,
            type: 'POST',
            success: function(response) {
                if (response.success) {
                    if (isFromWishlistPage && !response.isAdded) {
                        $('#wishlist-item-' + courseId).fadeOut(400, function() {
                            $(this).remove();
                            if ($('[id^="wishlist-item-"]').length === 0) {
                                location.reload(); // Reload to show empty state if last item removed
                            }
                        });
                    }
                }
            },
            error: function(xhr) {
                if (xhr.status === 401) {
                    window.location.href = '/auth/login';
                }
            }
        });
    }
</script>

</body>
</html>

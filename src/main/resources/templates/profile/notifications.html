<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head>
    <th:block th:replace="~{layout :: headMeta}"></th:block>
    <title>Thông báo của tôi | Coursia</title>
    <th:block th:replace="~{layout :: headCoreCss}"></th:block>
    <link rel="stylesheet" th:href="@{/css/profile.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .notification-page-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .notification-page-item {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            gap: 20px;
            text-decoration: none !important;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }
        .notification-page-item:hover {
            transform: translateX(5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }
        .notification-page-item.unread {
            background: #f0f7ff;
            border-left-color: var(--primary-color);
        }
        .noti-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .noti-SUCCESS { background: #ecfdf5; color: #10b981; }
        .noti-DANGER { background: #fef2f2; color: #ef4444; }
        .noti-WARNING { background: #fffbeb; color: #f59e0b; }
        .noti-INFO { background: #f0f9ff; color: #0ea5e9; }
        
        .noti-content {
            flex: 1;
        }
        .noti-title {
            display: block;
            font-weight: 800;
            font-size: 16px;
            color: #1e293b;
            margin-bottom: 5px;
        }
        .noti-message {
            display: block;
            font-size: 14px;
            color: #64748b;
            line-height: 1.5;
        }
        .noti-time {
            display: block;
            margin-top: 10px;
            font-size: 12px;
            color: #94a3b8;
            font-weight: 600;
        }
        .mark-read-badge {
            font-size: 11px;
            background: var(--primary-color);
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 10px;
        }
    </style>
</head>
<body>

<th:block th:replace="~{layout :: siteHeader(isTransparent=false)}"></th:block>

<div class="profile-dashboard-wrapper">
    <div class="profile-hero" th:style="'background-image: url(' + (${user.coverPhoto != null} ? (${user.coverPhoto.startsWith('http') ? user.coverPhoto : (user.coverPhoto.startsWith('/') ? user.coverPhoto : '/' + user.coverPhoto)}) : 'https://images.unsplash.com/photo-1510070112810-d4e9a46d9e91?auto=format&fit=crop&q=80&w=1600') + ')'">
        <div class="profile-hero-content">
            <h1>Thông báo của bạn</h1>
            <p>Luôn cập nhật những tin tức mới nhất về hoạt động của bạn.</p>
        </div>
    </div>

    <div class="dashboard-container">
        <aside class="dashboard-sidebar">
            <div th:replace="~{profile/fragments/sidebar :: profileSidebar('notifications')}"></div>
        </aside>

        <main class="dashboard-main-content">
            <div class="course-section-header">
                <h3>Tất cả thông báo</h3>
                <button id="pageMarkAllRead" class="btn btn-sm btn-primary rounded-pill px-4">Đánh dấu đã đọc hết</button>
            </div>

            <div class="notification-page-list" th:if="${notifications != null and !notifications.isEmpty()}">
                <a th:each="n : ${notifications}" 
                   th:href="${n.link != null ? n.link : 'javascript:void(0)'}" 
                   class="notification-page-item" 
                   th:classappend="${!n.isRead ? 'unread' : ''}"
                   th:data-id="${n.id}">
                    <div class="noti-icon" th:classappend="'noti-' + ${n.type}">
                        <i th:class="${n.type == 'SUCCESS' ? 'fas fa-check-circle' : (n.type == 'DANGER' ? 'fas fa-exclamation-circle' : (n.type == 'WARNING' ? 'fas fa-exclamation-triangle' : 'fas fa-info-circle'))}"></i>
                    </div>
                    <div class="noti-content">
                        <span class="noti-title">
                            <span th:text="${n.title}">Tiêu đề</span>
                            <span th:if="${!n.isRead}" class="mark-read-badge">Mới</span>
                        </span>
                        <span class="noti-message" th:utext="${n.message}">Nội dung</span>
                        <span class="noti-time" th:text="${#temporals.format(n.createdAt, 'dd/MM/yyyy HH:mm')}">Thời gian</span>
                    </div>
                </a>
            </div>

            <div th:if="${notifications == null or notifications.isEmpty()}" class="text-center py-5 bg-white border-radius-20 shadow-sm" style="border-radius:20px;">
                <i class="fas fa-bell-slash" style="font-size: 64px; color: #cbd5e1; margin-bottom: 20px;"></i>
                <h4>Bạn chưa có thông báo nào.</h4>
                <p class="text-muted">Mọi tin nhắn quan trọng sẽ xuất hiện ở đây!</p>
                <a th:href="@{/courses}" class="btn btn-primary mt-3 px-5 py-3 rounded-pill">Khám phá khóa học</a>
            </div>
        </main>
    </div>
</div>

<th:block th:replace="~{layout :: siteFooter}"></th:block>
<th:block th:replace="~{layout :: coreScripts}"></th:block>

<script>
    $(document).ready(function() {
        // Mark all read from page
        $('#pageMarkAllRead').on('click', function() {
            // Optimistic
            $('.notification-page-item').removeClass('unread');
            $('.mark-read-badge').remove();
            
            $.post('/api/notifications/mark-all-read', function() {
                location.reload();
            });
        });

        // Mark single read when clicking from this page
        $('.notification-page-item.unread').on('click', function(e) {
            const id = $(this).data('id');
            const $item = $(this);
            const link = $item.attr('href');
            
            if (id) {
                e.preventDefault();
                // Optimistic
                $item.removeClass('unread');
                $item.find('.mark-read-badge').remove();
                
                $.post('/api/notifications/mark-read/' + id).always(function() {
                    window.location.href = link;
                });
            }
        });
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <th:block th:replace="~{layout :: headMeta}"></th:block>
    <title>Lesson Detail</title>
    <th:block th:replace="~{layout :: headCoreCss}"></th:block>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div th:replace="~{layout :: siteHeader(isTransparent=false)}"></div>

<div class="admin-container">
    <div class="admin-content" th:if="${lesson != null}">
        <div class="d-flex justify-content-between align-items-center mb-3" style="gap: 12px; flex-wrap: wrap;">
            <h2 class="mb-0" th:text="${lesson.title}" style="background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); color: white; padding: 15px 20px; border-radius: 8px; flex: 1; min-width: 300px;">Lesson title</h2>
            <span class="badge lesson-status-badge"
                  th:classappend="${isCompleted} ? ' lesson-status-done' : ' lesson-status-pending'"
                  th:text="${isCompleted} ? 'Da hoc' : 'Chua hoc'">Chua hoc</span>
        </div>

        <p class="mb-3" style="color: var(--text-muted);">
            <i class="fas fa-book"></i>
            <span th:text="${lesson.course != null ? lesson.course.title : '-'}">Course</span>
        </p>

        <div class="admin-content" th:if="${lesson.videoUrl != null and !#strings.isEmpty(lesson.videoUrl)}">
            <a th:href="${lesson.videoUrl}" target="_blank" class="btn btn-outline-primary">
                <i class="fas fa-play"></i> Mo video bai hoc
            </a>
        </div>

        <div th:if="${lessonSuccess}" class="alert alert-success mt-3" th:text="${lessonSuccess}"></div>

        <form th:if="${!isCompleted}" th:action="@{'/lessons/' + ${lesson.id} + '/complete'}" method="post" class="mt-3">
            <button type="submit" class="btn btn-success">
                <i class="fas fa-check"></i> Danh dau da hoc
            </button>
        </form>

        <a th:href="@{'/courses/' + ${lesson.course.id}}" class="btn btn-secondary mt-3">
            <i class="fas fa-arrow-left"></i> Quay lai khoa hoc
        </a>
    </div>
</div>

<div th:replace="~{layout :: siteFooter}"></div>
<th:block th:replace="~{layout :: coreScripts}"></th:block>

</body>
</html>

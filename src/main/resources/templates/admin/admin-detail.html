<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chi Tiết Khóa Học - Course Management System</title>

    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/fontawesome-all.min.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>
<div class="admin-container">
    <!-- ... existing code ... -->

    <div class="admin-content" th:if="${course.lessons != null and !course.lessons.isEmpty()}">
        <h3 style="color: var(--secondary-color); margin-bottom: 25px;">
            <i class="fas fa-list-ul"></i> Danh Sách Bài Học
        </h3>

        <div class="lesson-grid">
            <div th:each="lesson, iterStat : ${course.lessons}" class="lesson-item">
                <div class="lesson-info">
                    <h4>
                        <span th:text="${iterStat.index + 1}"></span>.
                        <span th:text="${lesson.title}"></span>
                    </h4>
                    <p th:if="${lesson.videoUrl}" th:text="${lesson.videoUrl}"></p>
                    <p th:unless="${lesson.videoUrl}" style="color: var(--text-muted); font-style: italic;">
                        Chưa có video
                    </p>
                </div>
                <div class="lesson-actions">
                    <a th:if="${lesson.videoUrl}" th:href="${lesson.videoUrl}" target="_blank" class="btn btn-outline-primary btn-sm">
                        <i class="fas fa-play"></i> Xem
                    </a>
                    <a th:unless="${lesson.videoUrl}" class="btn btn-outline-secondary btn-sm" disabled>
                        <i class="fas fa-play"></i> Xem
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- ... existing code ... -->
</div>

</body>
</html>

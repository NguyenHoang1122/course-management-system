<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout :: headMeta}"></th:block>
    <title>Chọn Bài Học Cho Chương - Course Management System</title>

    <th:block th:replace="~{layout :: headCoreCss}"></th:block>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>
<div class="admin-shell">
    <div th:replace="~{admin/fragments/sidebar :: sidebar(${activeMenu})}"></div>
    <div class="admin-shell-main">
<div class="admin-container">
    <!-- Header -->
    <div class="admin-header">
        <h1><i class="fas fa-list-check"></i> Chọn Bài Học Cho Chương</h1>
        <p>Chọn các bài học để thêm vào chương "<strong th:text="${section.title}">Chương</strong>" của khóa học "<strong th:text="${course.title}">Khóa học</strong>"</p>
    </div>

    <!-- Course Info -->
    <div class="admin-content">
        <div class="course-info-card">
            <div class="d-flex align-items-center">
                <div class="course-icon">
                    <i class="fas fa-book-open"></i>
                </div>
                <div>
                    <h4 th:text="${course.title}" style="margin: 0; color: var(--secondary-color);"></h4>
                    <p style="margin: 0; color: var(--text-muted);">Chương: <strong th:text="${section.title}"></strong></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Form -->
    <div class="admin-content">
        <form th:action="@{'/admin/course/' + ${course.id} + '/assign-lessons'}" method="post">
            <input type="hidden" name="sectionId" th:value="${section.id}">

            <div class="form-group">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 style="margin: 0; color: var(--secondary-color);">Danh Sách Bài Học</h4>
                    <div>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Lưu Thay Đổi
                        </button>
                        <a th:href="@{'/admin/' + ${course.id}}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Quay Lại
                        </a>
                    </div>
                </div>

                <div th:if="${allLessons != null and !allLessons.isEmpty()}" class="lesson-selection-list">
                    <div th:each="lesson : ${allLessons}" class="lesson-selection-item">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" th:id="'lesson-' + ${lesson.id}"
                                   th:value="${lesson.id}" th:name="lessonIds"
                                   th:checked="${assignedLessonIds.contains(lesson.id)}">
                            <label class="form-check-label" th:for="'lesson-' + ${lesson.id}">
                                <div class="lesson-info">
                                    <div class="lesson-title" th:text="${lesson.title}">Lesson Title</div>
                                    <div class="lesson-meta">
                                        <small class="text-muted">
                                            <i class="fas fa-play-circle"></i>
                                            <span th:if="${lesson.section != null and lesson.section.id == section.id}" class="badge badge-success">Đã chọn</span>
                                            <span th:if="${lesson.section != null and lesson.section.id != section.id}" class="badge badge-warning">Thuộc chương khác</span>
                                            <span th:if="${lesson.section == null}" class="badge badge-secondary">Chưa phân loại</span>
                                        </small>
                                    </div>
                                </div>
                            </label>
                        </div>
                    </div>
                </div>

                <div th:if="${allLessons == null or allLessons.isEmpty()}" class="text-center py-5">
                    <i class="fas fa-exclamation-triangle" style="font-size: 4rem; color: #e2e8f0; margin-bottom: 20px; display: block;"></i>
                    <h4 style="color: #94a3b8;">Khóa học này chưa có bài học nào</h4>
                    <p style="color: #94a3b8;">Hãy tạo bài học trước khi thêm vào chương.</p>
                    <a th:href="@{'/admin/course/' + ${course.id} + '/add-lesson'}" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Thêm Bài Học Mới
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>
</div>
</div>

<th:block th:replace="~{layout :: coreScripts}"></th:block>

<style>
    .lesson-selection-list {
        max-height: 600px;
        overflow-y: auto;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 15px;
        background: #f8fafc;
    }

    .lesson-selection-item {
        padding: 12px 15px;
        margin-bottom: 8px;
        background: white;
        border-radius: 6px;
        border: 1px solid #e2e8f0;
        transition: all 0.2s ease;
    }

    .lesson-selection-item:hover {
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        border-color: var(--primary-color);
    }

    .lesson-selection-item .form-check {
        margin: 0;
        width: 100%;
    }

    .lesson-selection-item .form-check-input {
        margin-top: 0.3rem;
    }

    .lesson-info {
        display: flex;
        flex-direction: column;
        margin-left: 10px;
    }

    .lesson-title {
        font-weight: 500;
        color: #1e293b;
        margin-bottom: 4px;
    }

    .lesson-meta {
        font-size: 0.875rem;
    }

    .badge {
        font-size: 0.75rem;
        padding: 2px 6px;
        border-radius: 4px;
    }

    .badge-success {
        background-color: #10b981;
        color: white;
    }

    .badge-warning {
        background-color: #f59e0b;
        color: white;
    }

    .badge-secondary {
        background-color: #6b7280;
        color: white;
    }
</style>

</body>
</html>

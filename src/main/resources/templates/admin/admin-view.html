<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <th:block th:replace="~{layout :: headMeta}"></th:block>
    <title>Profile</title>
    <th:block th:replace="~{layout :: headCoreCss}"></th:block>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div class="admin-shell">
    <div th:replace="~{admin/fragments/sidebar :: sidebar(${activeMenu})}"></div>
    <div class="admin-shell-main">
        <div class="container mt-5 mb-5">
            <h2>Profile</h2>

            <p th:if="${param.updated}" class="text-success">Cập nhật thông tin thành công!</p>

            <div class="row">
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-body text-center">
                            <img th:if="${user.avatar}" th:src="${user.avatar}" alt="Avatar"
                                 class="img-fluid rounded-circle mb-3"
                                 style="width: 150px; height: 150px; object-fit: cover;"/>
                            <img th:if="${#strings.isEmpty(user.avatar)}" src="https://via.placeholder.com/150"
                                 alt="Avatar" class="img-fluid rounded-circle mb-3"
                                 style="width: 150px; height: 150px; object-fit: cover;"/>

                            <h5 th:text="${user.fullName}"></h5>
                            <p class="text-muted" th:text="${user.userName}"></p>
                            <a th:href="@{/admin/profile/edit}" class="btn btn-primary mt-2">Edit Profile</a>
                        </div>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="card mb-4">
                        <div class="card-header">
                            <h4>Thông tin cá nhân</h4>
                        </div>
                        <div class="card-body">
                            <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>
                            <p><strong>Phone:</strong> <span th:text="${user.phone}"></span></p>
                            <p><strong>Address:</strong> <span th:text="${user.address}"></span></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{layout :: coreScripts}"></th:block>

</body>
</html>

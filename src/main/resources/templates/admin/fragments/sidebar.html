<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<aside class="admin-sidebar" th:fragment="sidebar(activeMenu)">
    <div class="admin-sidebar-header">
        <a th:href="@{/admin/course-list}">
            <i class="fas fa-layer-group"></i>
            <span class="admin-sidebar-text">Admin Panel</span>
        </a>
        <button type="button" class="sidebar-toggle" onclick="document.body.classList.toggle('admin-sidebar-collapsed')">
            <i class="fas fa-bars"></i>
        </button>
    </div>

    <nav class="admin-sidebar-nav">

        <!-- Khóa học dropdown -->
        <div class="sidebar-dropdown">
            <button type="button"
                    class="admin-sidebar-link sidebar-dropdown-btn"
                    th:classappend="${activeMenu == 'courses'} ? ' active' : ''">
                <i class="fas fa-book"></i>
                <span class="admin-sidebar-text">Khóa học</span>
                <i class="fas fa-chevron-down sidebar-caret admin-sidebar-text"></i>
            </button>
            <div class="sidebar-submenu">
                <a th:href="@{/admin/course-list}" class="admin-sidebar-link admin-sidebar-sublink">
                    <i class="fas fa-list"></i>
                    <span class="admin-sidebar-text">Danh sách khóa học</span>
                </a>
                <a th:href="@{/admin/create-course}" class="admin-sidebar-link admin-sidebar-sublink">
                    <i class="fas fa-plus-circle"></i>
                    <span class="admin-sidebar-text">Thêm khóa học mới</span>
                </a>
            </div>
        </div>

        <!-- Bài học dropdown -->
        <div class="sidebar-dropdown">
            <button type="button"
                    class="admin-sidebar-link sidebar-dropdown-btn"
                    th:classappend="${activeMenu == 'lessons'} ? ' active' : ''">
                <i class="fas fa-play-circle"></i>
                <span class="admin-sidebar-text">Bài học</span>
                <i class="fas fa-chevron-down sidebar-caret admin-sidebar-text"></i>
            </button>
            <div class="sidebar-submenu">
                <a th:href="@{/admin/lesson-list}" class="admin-sidebar-link admin-sidebar-sublink">
                    <i class="fas fa-list"></i>
                    <span class="admin-sidebar-text">Danh sách bài học</span>
                </a>
                <a th:href="@{/admin/create-lesson}" class="admin-sidebar-link admin-sidebar-sublink">
                    <i class="fas fa-plus-circle"></i>
                    <span class="admin-sidebar-text">Tạo bài học mới</span>
                </a>
            </div>
        </div>

        <!-- Về trang chủ -->
        <a th:href="@{/}" class="admin-sidebar-link">
            <i class="fas fa-home"></i>
            <span class="admin-sidebar-text">Về trang chủ</span>
        </a>
    </nav>
</aside>
</body>
</html>

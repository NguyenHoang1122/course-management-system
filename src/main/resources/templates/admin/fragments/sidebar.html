<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<aside class="admin-sidebar" th:fragment="sidebar(activeMenu)">
    <!-- Mobile Backdrop -->
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <div class="admin-sidebar-header">
        <a th:href="@{/admin/course-list}" class="admin-sidebar-brand">
            <span class="sidebar-icon-wrap"><i class="fas fa-layer-group"></i></span>
            <span class="admin-sidebar-text">Admin Panel</span>
        </a>
        <!-- Nút toggle chính -->
        <button type="button" class="sidebar-toggle" id="sidebarToggle">
            <i class="fas fa-bars"></i>
        </button>
    </div>


    <!-- User Profile Section - Clickable to Profile -->
    <a th:href="@{/profile}" class="admin-sidebar-user" style="text-decoration: none; cursor: pointer;">
        <div class="user-avatar-wrap">
            <!-- Sử dụng biến avatarUrl được cung cấp bởi GlobalControllerAdvice -->
            <img th:src="${avatarUrl != null && !avatarUrl.isEmpty()} ? ${avatarUrl} : 'https://ui-avatars.com/api/?name=' + ${username} + '&background=6366f1&color=fff'" alt="Avatar" />
        </div>
        <div class="user-info">
            <span class="user-name" th:text="${fullName != null} ? ${fullName} : ${username}">Admin</span>
            <span class="user-role">Quản trị viên</span>
        </div>
    </a>



    <nav class="admin-sidebar-nav">
        <!-- Home Button - Top Priority -->
        <div class="sidebar-single-item" data-label="Trang chủ">
            <a th:href="@{/}" class="admin-sidebar-link">
                <span class="sidebar-icon-wrap"><i class="fas fa-home"></i></span>
                <span class="admin-sidebar-text">Về trang chủ</span>
            </a>
        </div>

        <!-- Content Management Section -->
        <div class="sidebar-group-label">Quản lý nội dung</div>
        <!-- Khóa học -->

        <div class="sidebar-dropdown" data-label="Khóa học">
            <button type="button" class="admin-sidebar-link sidebar-dropdown-btn" th:classappend="${activeMenu == 'courses'} ? ' active' : ''">
                <span class="sidebar-icon-wrap"><i class="fas fa-book"></i></span>
                <span class="admin-sidebar-text">Khóa học</span>
                <i class="fas fa-chevron-down sidebar-caret admin-sidebar-text"></i>
            </button>
            <div class="sidebar-submenu">
                <a th:href="@{/admin/course-list}" class="admin-sidebar-link admin-sidebar-sublink">
                    <span class="sidebar-icon-wrap"><i class="fas fa-list"></i></span>
                    <span class="admin-sidebar-subtext">Danh sách khóa học</span>
                </a>
                <a th:href="@{/admin/create-course}" class="admin-sidebar-link admin-sidebar-sublink">
                    <span class="sidebar-icon-wrap"><i class="fas fa-plus-circle"></i></span>
                    <span class="admin-sidebar-subtext">Thêm khóa học mới</span>
                </a>
            </div>
        </div>

        <!-- Bài học -->
        <div class="sidebar-dropdown" data-label="Bài học">
            <button type="button" class="admin-sidebar-link sidebar-dropdown-btn" th:classappend="${activeMenu == 'lessons'} ? ' active' : ''">
                <span class="sidebar-icon-wrap"><i class="fas fa-play-circle"></i></span>
                <span class="admin-sidebar-text">Bài học</span>
                <i class="fas fa-chevron-down sidebar-caret admin-sidebar-text"></i>
            </button>
            <div class="sidebar-submenu">
                <a th:href="@{/admin/lesson-list}" class="admin-sidebar-link admin-sidebar-sublink">
                    <span class="sidebar-icon-wrap"><i class="fas fa-list"></i></span>
                    <span class="admin-sidebar-subtext">Danh sách bài học</span>
                </a>
                <a th:href="@{/admin/create-lesson}" class="admin-sidebar-link admin-sidebar-sublink">
                    <span class="sidebar-icon-wrap"><i class="fas fa-plus-circle"></i></span>
                    <span class="admin-sidebar-subtext">Tạo bài học mới</span>
                </a>
            </div>
        </div>

        <!-- System Section -->
        <div class="sidebar-group-label">Hệ thống</div>
        
        <!-- Người dùng -->
        <div class="sidebar-single-item" data-label="Người dùng">
            <a th:href="@{/admin/user-list}" class="admin-sidebar-link" th:classappend="${activeMenu == 'users'} ? ' active' : ''">
                <span class="sidebar-icon-wrap"><i class="fas fa-users"></i></span>
                <span class="admin-sidebar-text">Quản lý người dùng</span>
            </a>
        </div>

        <!-- Thùng rác -->
        <div class="sidebar-single-item" data-label="Thùng rác">
            <a th:href="@{/admin/user-trash}" class="admin-sidebar-link" th:classappend="${activeMenu == 'user-trash'} ? ' active' : ''">
                <span class="sidebar-icon-wrap"><i class="fas fa-trash-alt"></i></span>
                <span class="admin-sidebar-text">Thùng rác</span>
            </a>
        </div>
    </nav>

    <!-- Sidebar Footer -->
    <div class="admin-sidebar-footer">
        <a th:href="@{/profile}" class="admin-sidebar-link">
            <span class="sidebar-icon-wrap"><i class="fas fa-user-circle"></i></span>
            <span class="admin-sidebar-text">Hồ sơ của tôi</span>
        </a>
        <form th:action="@{/logout}" method="post" style="display: none;" id="logoutForm">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        </form>
        <a href="javascript:void(0)" onclick="document.getElementById('logoutForm').submit()" class="admin-sidebar-link logout-link">
            <span class="sidebar-icon-wrap"><i class="fas fa-sign-out-alt"></i></span>
            <span class="admin-sidebar-text">Đăng xuất</span>
        </a>
    </div>

    <!-- Sidebar Logic Script -->
    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            const sidebar = document.querySelector('.admin-sidebar');
            const toggleBtn = document.getElementById('sidebarToggle');
            const backdrop = document.getElementById('sidebarBackdrop');
            const dropdowns = document.querySelectorAll('.sidebar-dropdown');
            const currentMenu = /*[[${activeMenu}]]*/ '';

            // 1. Khôi phục trạng thái Sidebar từ LocalStorage (chỉ cho Desktop)
            if (window.innerWidth > 768) {
                const isCollapsed = localStorage.getItem('admin-sidebar-collapsed') === 'true';
                if (isCollapsed) {
                    document.body.classList.add('admin-sidebar-collapsed');
                }
            }

            // 2. Xử lý Toggle Sidebar (Hỗ trợ cả Desktop thu gọn và Mobile Drawer)
            toggleBtn.addEventListener('click', function() {
                if (window.innerWidth <= 768) {
                    // Mobile: Toggle Drawer
                    document.body.classList.toggle('admin-sidebar-mobile-open');
                } else {
                    // Desktop: Toggle Collapsed
                    const newState = document.body.classList.toggle('admin-sidebar-collapsed');
                    localStorage.setItem('admin-sidebar-collapsed', newState);
                }
            });

            // Đóng sidebar khi click vào backdrop (chỉ trên mobile)
            backdrop.addEventListener('click', function() {
                document.body.classList.remove('admin-sidebar-mobile-open');
            });


            // 3. Xử lý Dropdown Click
            dropdowns.forEach(dropdown => {
                const btn = dropdown.querySelector('.sidebar-dropdown-btn');
                
                // Mở sẵn nếu menu con đang active
                if (dropdown.dataset.label === 'Khóa học' && currentMenu === 'courses') {
                    dropdown.classList.add('open');
                } else if (dropdown.dataset.label === 'Bài học' && currentMenu === 'lessons') {
                    dropdown.classList.add('open');
                }

                btn.addEventListener('click', function(e) {
                    // Nếu đang thu gọn sidebar thì không xử lý dropdown qua click (hoặc xử lý khác tùy UI)
                    if (document.body.classList.contains('admin-sidebar-collapsed')) return;

                    // Đóng các dropdown khác (tùy chọn - nếu muốn kiểu Accordion)
                    dropdowns.forEach(d => {
                        if (d !== dropdown) d.classList.remove('open');
                    });

                    dropdown.classList.toggle('open');
                });
            });

            // 4. Highlight active sublinks
            const currentPath = window.location.pathname;
            document.querySelectorAll('.admin-sidebar-sublink').forEach(link => {
                if (link.getAttribute('href') === currentPath) {
                    link.classList.add('active');
                    // Đảm bảo cha nó được mở
                    link.closest('.sidebar-dropdown').classList.add('open');
                }
            });
        });
    </script>

</aside>
</body>
</html>

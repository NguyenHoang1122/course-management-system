<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="courseDetail">
    <div class="modal-body-inner">
        <h3 class="mb-3" th:text="${course.title}">Course Title</h3>

        <p th:text="${course.description}" class="mb-4">Description</p>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="detail-box">
                    <strong>Giá</strong>
                    <div th:text="${#numbers.formatDecimal(course.price, 1, 'COMMA', 0, 'POINT')} + ' VND'"></div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="detail-box">
                    <strong>Giảng viên</strong>
                    <div th:text="${course.instructor != null ? course.instructor.fullName : '-'}"></div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="detail-box">
                    <strong>Ngày tạo</strong>
                    <div th:text="${course.createdAt != null ? #temporals.format(course.createdAt, 'dd/MM/yyyy') : '-'}"></div>
                </div>
            </div>
        </div>

        <h5 class="mb-3">Danh sách bài học</h5>
        <div th:if="${course.lessons != null and !course.lessons.isEmpty()}">
            <div th:each="lesson, iterStat : ${course.lessons}" class="lesson-row">
                <div>
                    <strong th:text="${iterStat.index + 1} + '. ' + ${lesson.title}"></strong>
                    <div th:if="${lesson.videoUrl}" th:text="${lesson.videoUrl}" style="font-size: 0.9rem; color: #6c757d;"></div>
                    <div th:unless="${lesson.videoUrl}" style="font-size: 0.9rem; color: #6c757d;">Chưa có video</div>
                </div>
            </div>
        </div>

        <div th:if="${course.lessons == null or course.lessons.isEmpty()}" class="text-muted">
            Chưa có bài học nào.
        </div>

        <div class="d-flex justify-content-end mt-4">
            <button type="button" class="btn btn-secondary" onclick="closeCourseModal()">Đóng</button>
        </div>
    </div>
</div>
</body>
</html>

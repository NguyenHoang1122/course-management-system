<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="courseForm">
    <div class="modal-body-inner">
        <form id="courseForm" th:action="@{/admin/save-course-ajax}" th:object="${courseDTO}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label">
                    <i class="fas fa-heading"></i> Tên Khóa Học
                </label>
                <input type="text" class="form-control" th:field="*{title}" placeholder="Nhập tên khóa học" required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    <i class="fas fa-align-left"></i> Mô Tả
                </label>
                <textarea class="form-control" th:field="*{description}" rows="4" placeholder="Nhập mô tả khóa học" required></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    <i class="fas fa-dollar-sign"></i> Giá
                </label>
                <input type="number" class="form-control" th:field="*{price}" placeholder="Nhập giá" required min="0">
            </div>

            <div class="mb-3">
                <label class="form-label">
                    <i class="fas fa-user-tie"></i> Giảng Viên
                </label>
                <select class="form-control" th:field="*{instructorId}" required>
                    <option value="">-- Chọn Giảng Viên --</option>
                    <option th:each="user : ${instructors}"
                            th:value="${user.id}"
                            th:text="${user.fullName}">
                    </option>
                </select>
            </div>

            <div class="d-flex gap-2 justify-content-end mt-4">
                <button type="button" class="btn btn-secondary" onclick="closeCourseModal()">Hủy</button>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Lưu
                </button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
